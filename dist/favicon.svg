<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Skladný tmavý podkres portfolia -->
  <rect width="512" height="512" rx="120" fill="#080808"/>
  <rect x="4" y="4" width="504" height="504" rx="116" stroke="#1c1c1c" stroke-width="8" opacity="0.5"/>

  <!-- Skupina nakloněná do kurzívy (skew) kolem středu canvasu (256, 256) -->
  <g transform="translate(256, 256) skewX(-14) translate(-256, -256)">
    <!-- Monogram F (v elegantní off-white #F0EDE6) -->
    <g fill="#F0EDE6">
      <!-- Hlavní svislá čára -->
      <rect x="96" y="120" width="48" height="272" rx="3"/>
      <!-- Horní vodorovná čára -->
      <rect x="144" y="120" width="96" height="48" rx="3"/>
      <!-- Prostřední vodorovná čára -->
      <rect x="144" y="232" width="72" height="48" rx="3"/>
    </g>

    <!-- Monogram H (také v elegantní off-white #F0EDE6 pro sjednocení a prémiový look) -->
    <g fill="#F0EDE6">
      <!-- Levá svislá čára -->
      <rect x="272" y="120" width="48" height="272" rx="3"/>
      <!-- Pravá svislá čára -->
      <rect x="368" y="120" width="48" height="272" rx="3"/>
      <!-- Spojnice -->
      <rect x="320" y="232" width="48" height="48"/>
    </g>

    <!-- Zlatavá hvězdička (#E8A238) v horním indexu, která se nakloní společně s monogramem -->
    <g transform="translate(426, 110) scale(0.48)" fill="#E8A238">
      <!-- Svislá osa -->
      <path d="M0 -46 C 4 -10 4 -10 0 0 C -4 -10 -4 -10 0 -46 Z" />
      <path d="M0 46 C 4 10 4 10 0 0 C -4 10 -4 10 0 46 Z" />
      <!-- Vodorovná osa -->
      <path d="M-30 0 C -8 4 -8 4 0 0 C -8 -4 -8 -4 -30 0 Z" />
      <path d="M30 0 C 8 4 8 4 0 0 C 8 -4 8 -4 30 0 Z" />
    </g>
  </g>
</svg>
