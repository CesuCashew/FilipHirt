[build]
  publish = "dist"
  command = "npm run build"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback — deep links like /zurnal/:slug must serve the app shell
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
